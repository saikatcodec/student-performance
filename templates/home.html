<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Exam Performance Indicator</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', path='/styles/home.css') }}"
    />
  </head>
  <body>
    <div class="bg"></div>

    <div class="wrapper">
      <div class="header">
        <p class="header-eyebrow">AI-Powered Academic Insights</p>
        <h1>Student Exam<br /><span>Performance</span> Predictor</h1>
        <div class="header-rule"><div class="header-rule-dot"></div></div>
      </div>

      <div class="card">
        <form action="{{ url_for('predict_data') }}" method="post">
          <p class="section-title">Demographics</p>
          <div class="grid-2">
            <div class="field">
              <label for="gender">Gender</label>
              <select id="gender" name="gender" required>
                <option value="" selected disabled>Select gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
              </select>
            </div>
            <div class="field">
              <label for="race_ethnicity">Race / Ethnicity</label>
              <select id="race_ethnicity" name="race_ethnicity" required>
                <option value="" selected disabled>Select group</option>
                <option value="group A">Group A</option>
                <option value="group B">Group B</option>
                <option value="group C">Group C</option>
                <option value="group D">Group D</option>
                <option value="group E">Group E</option>
              </select>
            </div>
          </div>

          <p class="section-title">Background</p>
          <div class="grid-1">
            <div class="field">
              <label for="parental_level_of_education"
                >Parental Level of Education</label
              >
              <select
                id="parental_level_of_education"
                name="parental_level_of_education"
                required
              >
                <option value="" selected disabled>
                  Select education level
                </option>
                <option value="associate's degree">Associate's Degree</option>
                <option value="bachelor's degree">Bachelor's Degree</option>
                <option value="high school">High School</option>
                <option value="master's degree">Master's Degree</option>
                <option value="some college">Some College</option>
                <option value="some high school">Some High School</option>
              </select>
            </div>
          </div>

          <p class="section-title">Preparation</p>
          <div class="grid-2">
            <div class="field">
              <label for="lunch">Lunch Type</label>
              <select id="lunch" name="lunch" required>
                <option value="" selected disabled>Select type</option>
                <option value="free/reduced">Free / Reduced</option>
                <option value="standard">Standard</option>
              </select>
            </div>
            <div class="field">
              <label for="test_preparation_course">Test Prep Course</label>
              <select
                id="test_preparation_course"
                name="test_preparation_course"
                required
              >
                <option value="" selected disabled>Select status</option>
                <option value="none">Not Completed</option>
                <option value="completed">Completed</option>
              </select>
            </div>
          </div>

          <p class="section-title">Existing Scores</p>
          <div class="grid-2">
            <div class="field">
              <label for="reading_score">Reading Score</label>
              <div class="score-wrap">
                <input
                  type="number"
                  id="reading_score"
                  name="reading_score"
                  placeholder="0 – 100"
                  min="0"
                  max="100"
                  required
                />
                <span class="score-badge">/ 100</span>
              </div>
            </div>
            <div class="field">
              <label for="writing_score">Writing Score</label>
              <div class="score-wrap">
                <input
                  type="number"
                  id="writing_score"
                  name="writing_score"
                  placeholder="0 – 100"
                  min="0"
                  max="100"
                  required
                />
                <span class="score-badge">/ 100</span>
              </div>
            </div>
          </div>

          <div class="cta-wrap">
            <button type="submit">Predict Mathematics Score →</button>
          </div>
        </form>

        {% if results %}
        <div class="result-box">
          <p class="result-label">Predicted Mathematics Score</p>
          <div class="result-score">{{ results }}</div>
          <p class="result-sub">out of 100</p>
        </div>
        {% endif %}
      </div>
    </div>
  </body>
</html>
